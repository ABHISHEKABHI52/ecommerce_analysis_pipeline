<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2.5rem;
        }

        p {
            margin: 0 0 24px;
            line-height: 1.6;
            color: #4b5563;
        }

        a {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 999px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>404</h1>
        <p>The page you requested could not be found.</p>
        <a href="/">Back to Dashboard</a>
    </main>
</body>
</html>
